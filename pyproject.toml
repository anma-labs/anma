[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "anma-scaffold"
version = "0.1.0"
description = "AI-Native Modular Architecture — contract-driven scaffold for AI agents"
requires-python = ">=3.10"
dependencies = ["pyyaml"]

[project.optional-dependencies]
tokens = ["tiktoken"]

[project.scripts]
anma = "tools.anma:main"

[tool.setuptools]
packages = ["tools"]
