# Ground truth used by the scorer. Independent of ANMA — it just declares the
# allowed dependency graph this scenario is scored against.
language: go
module_prefix: example.com/shop   # go.mod module path; stripped to reach the slash paths below
source_root: .
modules:
  accounts:
    path: domains/accounts
    allow: []            # accounts must NOT depend on billing
  billing:
    path: domains/billing
    allow: [accounts]    # billing may use accounts' public interface
