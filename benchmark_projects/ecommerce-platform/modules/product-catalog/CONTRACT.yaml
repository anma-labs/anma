module: product-catalog
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Product listings, categories, search, and variant management
provides:
- id: create_product
  input:
    name: string
    description: string
    price_cents: integer
    category_id: uuid
    variants: '[{sku: string, attributes: object, price_override: integer | null}]'
  output:
    product_id: uuid
    slug: string
  errors:
  - INVALID_CATEGORY
  - DUPLICATE_SKU
  - INVALID_PRICE
  invariants:
  - slug auto-generated from name, unique
  - at least one variant required
  - publishes product_created event via BUS
- id: search_products
  input:
    query: string | null
    category_id: uuid | null
    min_price: integer | null
    max_price: integer | null
    sort: string | null
    page: integer
  output:
    products: '[object]'
    total: integer
    facets: object
  errors:
  - INVALID_SORT
  invariants:
  - 'sort options: relevance, price_asc, price_desc, newest'
  - facets include category counts and price ranges
  - excludes out-of-stock by default
- id: get_product
  input:
    product_id: uuid
  output:
    product: object
  errors:
  - PRODUCT_NOT_FOUND
  invariants:
  - includes all variants with current inventory counts
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
