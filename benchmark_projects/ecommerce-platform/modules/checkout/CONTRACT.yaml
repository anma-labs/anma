module: checkout
version: 1
conventions_version: 2
status: draft
type: regular
purpose: 'Convert cart to order: address, shipping selection, payment, and confirmation'
provides:
- id: initiate_checkout
  input:
    cart_id: uuid
    customer_id: uuid
  output:
    checkout_id: uuid
    items: '[object]'
    subtotal_cents: integer
  errors:
  - CART_EMPTY
  - CART_NOT_FOUND
  invariants:
  - reserves inventory for all items
  - locks cart from modifications during checkout
- id: set_shipping
  input:
    checkout_id: uuid
    address: object
    shipping_method: string
  output:
    shipping_cost_cents: integer
    estimated_delivery: string
    total_cents: integer
  errors:
  - CHECKOUT_NOT_FOUND
  - INVALID_ADDRESS
  - SHIPPING_UNAVAILABLE
  invariants:
  - validates address format
  - recalculates total with shipping
- id: place_order
  input:
    checkout_id: uuid
    payment_method_id: string
  output:
    order_id: uuid
    status: string
    total_charged_cents: integer
  errors:
  - CHECKOUT_NOT_FOUND
  - PAYMENT_FAILED
  - INVENTORY_CHANGED
  invariants:
  - confirms inventory reservations
  - charges payment
  - publishes order_placed event via BUS
  - clears cart on success
consumes:
- module: cart
  interface: get_cart
  required: true
  contract_version: 1
- module: inventory
  interface: reserve_stock
  required: true
  contract_version: 1
- module: inventory
  interface: confirm_stock
  required: true
  contract_version: 1
- module: payments
  interface: charge
  required: true
  contract_version: 1
- module: shipping
  interface: get_rates
  required: true
  contract_version: 1
