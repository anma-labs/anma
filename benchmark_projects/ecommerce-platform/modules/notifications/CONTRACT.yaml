module: notifications
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Order confirmation emails, shipping updates, review requests, and marketing
provides:
- id: send_notification
  input:
    customer_id: uuid
    type: string
    data: object
  output:
    notification_id: uuid
    channel: string
  errors:
  - CUSTOMER_NOT_FOUND
  - INVALID_TYPE
  invariants:
  - 'types: order_confirmed, shipped, delivered, review_request, promo'
  - subscribes to order_placed, shipment_created events via BUS
  - respects customer notification preferences
- id: get_preferences
  input:
    customer_id: uuid
  output:
    preferences: '{email: boolean, sms: boolean, push: boolean, marketing: boolean}'
  errors:
  - CUSTOMER_NOT_FOUND
  invariants:
  - marketing defaults to false — explicit opt-in required
consumes:
- module: customer-accounts
  interface: get_profile
  required: true
  contract_version: 1
