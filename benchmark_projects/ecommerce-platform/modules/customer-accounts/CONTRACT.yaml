module: customer-accounts
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Customer profiles, saved addresses, wishlists, and order history
provides:
- id: get_profile
  input:
    customer_id: uuid
  output:
    profile: object
  errors:
  - CUSTOMER_NOT_FOUND
  invariants:
  - includes saved addresses and default payment method
- id: update_profile
  input:
    customer_id: uuid
    fields: object
  output:
    profile: object
  errors:
  - CUSTOMER_NOT_FOUND
  - INVALID_FIELD
  invariants:
  - 'only allowed fields: name, phone, default_address_id'
- id: manage_wishlist
  input:
    customer_id: uuid
    action: string
    product_id: uuid
  output:
    wishlist: '[uuid]'
  errors:
  - CUSTOMER_NOT_FOUND
  - PRODUCT_NOT_FOUND
  invariants:
  - 'actions: add, remove'
  - max 50 items
consumes:
- module: product-catalog
  interface: get_product
  required: true
  contract_version: 1
