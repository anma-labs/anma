module: reviews
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Product reviews, ratings, and review moderation
provides:
- id: submit_review
  input:
    product_id: uuid
    customer_id: uuid
    rating: integer
    title: string
    body: string
  output:
    review_id: uuid
  errors:
  - PRODUCT_NOT_FOUND
  - ALREADY_REVIEWED
  - NOT_PURCHASED
  - INVALID_RATING
  invariants:
  - rating 1-5
  - customer must have purchased product
  - publishes review_submitted event via BUS
- id: get_reviews
  input:
    product_id: uuid
    sort: string | null
  output:
    reviews: '[object]'
    average_rating: float
    total: integer
    distribution: '{1: integer, 2: integer, 3: integer, 4: integer, 5: integer}'
  errors:
  - PRODUCT_NOT_FOUND
  invariants:
  - 'sort: newest, highest, lowest, most_helpful'
  - paginated, 10 per page
consumes:
- module: product-catalog
  interface: get_product
  required: true
  contract_version: 1
