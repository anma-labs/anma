module: cart
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Shopping cart with item management, quantity updates, and price calculation
provides:
- id: add_item
  input:
    cart_id: uuid | null
    sku: string
    quantity: integer
  output:
    cart_id: uuid
    items: '[object]'
    subtotal_cents: integer
  errors:
  - SKU_NOT_FOUND
  - INSUFFICIENT_STOCK
  - MAX_QUANTITY_EXCEEDED
  invariants:
  - creates new cart if cart_id is null
  - max 10 of same SKU
  - checks inventory availability on add
- id: update_quantity
  input:
    cart_id: uuid
    sku: string
    quantity: integer
  output:
    items: '[object]'
    subtotal_cents: integer
  errors:
  - CART_NOT_FOUND
  - ITEM_NOT_IN_CART
  - INSUFFICIENT_STOCK
  invariants:
  - quantity 0 removes item from cart
- id: get_cart
  input:
    cart_id: uuid
  output:
    items: '[{sku: string, name: string, quantity: integer, unit_price_cents: integer}]'
    subtotal_cents: integer
    item_count: integer
  errors:
  - CART_NOT_FOUND
  invariants:
  - re-checks current prices on every get — price may have changed since add
consumes:
- module: product-catalog
  interface: get_product
  required: true
  contract_version: 1
- module: inventory
  interface: check_availability
  required: true
  contract_version: 1
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
