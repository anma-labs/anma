module: order-mgmt
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Order lifecycle, status tracking, cancellation, and return processing
provides:
- id: get_order
  input:
    order_id: uuid
  output:
    order: object
  errors:
  - ORDER_NOT_FOUND
  invariants:
  - includes items, payment status, shipping status, timeline
- id: list_orders
  input:
    customer_id: uuid
    status: string | null
  output:
    orders: '[object]'
    total: integer
  errors: []
  invariants:
  - paginated, newest first, 20 per page
  - subscribes to order_placed event via BUS to create order records
- id: cancel_order
  input:
    order_id: uuid
    reason: string
  output:
    cancelled: boolean
    refund_id: uuid | null
  errors:
  - ORDER_NOT_FOUND
  - ALREADY_SHIPPED
  - ALREADY_CANCELLED
  invariants:
  - auto-refunds payment if charged
  - releases inventory reservations
  - publishes order_cancelled event via BUS
consumes:
- module: payments
  interface: refund
  required: true
  contract_version: 1
- module: inventory
  interface: release_reservation
  required: true
  contract_version: 1
- module: shipping
  interface: get_tracking
  required: false
  contract_version: 1
