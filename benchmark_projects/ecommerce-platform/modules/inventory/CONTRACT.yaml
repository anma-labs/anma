module: inventory
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Track stock levels per SKU, handle reservations, and low-stock alerts
provides:
- id: check_availability
  input:
    sku: string
    quantity: integer
  output:
    available: boolean
    current_stock: integer
    reserved: integer
  errors:
  - SKU_NOT_FOUND
  invariants:
  - available = current_stock - reserved >= quantity
- id: reserve_stock
  input:
    sku: string
    quantity: integer
    reservation_id: uuid
  output:
    reserved: boolean
    expires_at: datetime
  errors:
  - SKU_NOT_FOUND
  - INSUFFICIENT_STOCK
  invariants:
  - reservation expires after 15 minutes
  - publishes low_stock event via BUS when stock drops below threshold
- id: release_reservation
  input:
    reservation_id: uuid
  output:
    released: boolean
  errors:
  - RESERVATION_NOT_FOUND
  invariants:
  - idempotent — releasing expired reservation succeeds silently
- id: confirm_stock
  input:
    reservation_id: uuid
  output:
    confirmed: boolean
  errors:
  - RESERVATION_NOT_FOUND
  - RESERVATION_EXPIRED
  invariants:
  - permanently decrements stock — not reversible without explicit restock
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
