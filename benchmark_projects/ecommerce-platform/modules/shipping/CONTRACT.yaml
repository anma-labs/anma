module: shipping
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Calculate shipping rates, create labels, and track shipments
provides:
- id: get_rates
  input:
    origin: object
    destination: object
    items: '[{weight_g: integer, dimensions: object}]'
  output:
    rates: '[{carrier: string, method: string, cost_cents: integer, estimated_days: integer}]'
  errors:
  - INVALID_ADDRESS
  - NO_RATES_AVAILABLE
  invariants:
  - returns at least one rate or errors
  - sorted by cost ascending
- id: create_shipment
  input:
    order_id: uuid
    carrier: string
    method: string
  output:
    shipment_id: uuid
    tracking_number: string
    label_url: string
  errors:
  - ORDER_NOT_FOUND
  - CARRIER_ERROR
  invariants:
  - publishes shipment_created event via BUS
  - tracking_number unique per carrier
- id: get_tracking
  input:
    shipment_id: uuid
  output:
    status: string
    events: '[{timestamp: datetime, location: string, description: string}]'
    estimated_delivery: datetime | null
  errors:
  - SHIPMENT_NOT_FOUND
  invariants:
  - 'statuses: label_created, in_transit, out_for_delivery, delivered, exception'
consumes: []
