module: payments
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Process payments, handle refunds, and manage stored payment methods
provides:
- id: charge
  input:
    customer_id: uuid
    amount_cents: integer
    payment_method_id: string
    idempotency_key: uuid
  output:
    payment_id: uuid
    status: string
    charged_at: datetime
  errors:
  - PAYMENT_DECLINED
  - INVALID_AMOUNT
  - INVALID_PAYMENT_METHOD
  invariants:
  - idempotent — same key returns same result
  - 'statuses: succeeded, pending, failed'
- id: refund
  input:
    payment_id: uuid
    amount_cents: integer | null
  output:
    refund_id: uuid
    refunded_cents: integer
  errors:
  - PAYMENT_NOT_FOUND
  - ALREADY_REFUNDED
  - REFUND_EXCEEDS_CHARGE
  invariants:
  - null amount = full refund
  - partial refunds allowed, tracks cumulative
  - publishes refund_issued event via BUS
consumes: []
