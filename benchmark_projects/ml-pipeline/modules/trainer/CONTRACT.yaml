module: trainer
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Configure, execute, and monitor model training runs with hyperparameter tracking
provides:
- id: start_training
  input:
    model_type: string
    hyperparams: object
    feature_set_id: uuid
    split_id: uuid
  output:
    run_id: uuid
    started_at: datetime
  errors:
  - INVALID_MODEL_TYPE
  - FEATURE_SET_NOT_FOUND
  - SPLIT_NOT_FOUND
  invariants:
  - 'model_types: linear, tree, neural, ensemble'
  - logs all hyperparams for reproducibility
  - publishes training_started event via BUS
- id: get_run_status
  input:
    run_id: uuid
  output:
    status: string
    epoch: integer | null
    metrics: object
    elapsed_seconds: integer
  errors:
  - RUN_NOT_FOUND
  invariants:
  - 'statuses: queued, running, completed, failed'
  - metrics updated every epoch for neural models
- id: stop_training
  input:
    run_id: uuid
  output:
    stopped: boolean
    checkpoint_path: string | null
  errors:
  - RUN_NOT_FOUND
  - NOT_RUNNING
  invariants:
  - saves checkpoint at current state before stopping
consumes:
- module: dataset-manager
  interface: get_batch
  required: true
  contract_version: 1
- module: feature-engineering
  interface: run_pipeline
  required: true
  contract_version: 1
