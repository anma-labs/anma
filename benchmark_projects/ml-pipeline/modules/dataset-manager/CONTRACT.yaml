module: dataset-manager
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Register, version, split, and serve datasets for training and evaluation
provides:
- id: register_dataset
  input:
    name: string
    source_path: string
    format: string
    schema: object
  output:
    dataset_id: uuid
    version: integer
    row_count: integer
    size_bytes: integer
  errors:
  - ALREADY_EXISTS
  - INVALID_FORMAT
  - SOURCE_NOT_FOUND
  invariants:
  - 'formats: csv, parquet, jsonl'
  - auto-increments version on re-register of same name
  - publishes dataset_registered event via BUS
- id: create_split
  input:
    dataset_id: uuid
    train_ratio: float
    val_ratio: float
    test_ratio: float
    seed: integer | null
  output:
    split_id: uuid
    train_count: integer
    val_count: integer
    test_count: integer
  errors:
  - DATASET_NOT_FOUND
  - INVALID_RATIOS
  invariants:
  - ratios must sum to 1.0
  - deterministic with same seed
  - stratified on label column if classification
- id: get_batch
  input:
    split_id: uuid
    split_type: string
    batch_size: integer
    offset: integer
  output:
    records: '[object]'
    has_more: boolean
  errors:
  - SPLIT_NOT_FOUND
  - INVALID_SPLIT_TYPE
  invariants:
  - 'split_type: train, val, test'
  - returns records in deterministic order for reproducibility
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
