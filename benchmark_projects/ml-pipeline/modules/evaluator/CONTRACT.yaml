module: evaluator
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Evaluate trained models on test sets, compare runs, and generate reports
provides:
- id: evaluate_model
  input:
    run_id: uuid
    split_type: string
  output:
    eval_id: uuid
    metrics: '{accuracy: float | null, precision: float | null, recall: float | null, f1: float | null, mse: float | null,
      r2: float | null}'
  errors:
  - RUN_NOT_FOUND
  - TRAINING_NOT_COMPLETE
  invariants:
  - classification metrics for classifiers, regression metrics for regressors
  - publishes evaluation_complete event via BUS
- id: compare_runs
  input:
    run_ids: '[uuid]'
  output:
    comparison: '[{run_id: uuid, model_type: string, hyperparams: object, metrics: object}]'
    best_run_id: uuid
  errors:
  - RUN_NOT_FOUND
  invariants:
  - 'best determined by primary metric: f1 for classification, r2 for regression'
  - max 10 runs per comparison
consumes:
- module: trainer
  interface: get_run_status
  required: true
  contract_version: 1
