module: feature-engineering
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Feature extraction, transformation pipelines, and feature store
provides:
- id: create_pipeline
  input:
    name: string
    steps: '[{type: string, config: object}]'
  output:
    pipeline_id: uuid
  errors:
  - INVALID_STEP
  - NAME_EXISTS
  invariants:
  - 'step types: normalize, one_hot, bucketize, embedding_lookup, custom_transform'
  - validates step compatibility in sequence
- id: run_pipeline
  input:
    pipeline_id: uuid
    dataset_id: uuid
  output:
    feature_set_id: uuid
    feature_count: integer
    row_count: integer
  errors:
  - PIPELINE_NOT_FOUND
  - DATASET_NOT_FOUND
  - TRANSFORM_ERROR
  invariants:
  - stores fitted parameters for inference-time reuse
  - publishes features_ready event via BUS
- id: get_feature_stats
  input:
    feature_set_id: uuid
  output:
    features: '[{name: string, dtype: string, mean: float | null, std: float | null, missing_pct: float, unique_count: integer}]'
  errors:
  - FEATURE_SET_NOT_FOUND
  invariants:
  - stats computed during run_pipeline, cached for fast retrieval
consumes:
- module: dataset-manager
  interface: get_batch
  required: true
  contract_version: 1
