module: model-registry
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Version, store, and deploy trained models with rollback capability
provides:
- id: register_model
  input:
    run_id: uuid
    name: string
    description: string | null
  output:
    model_id: uuid
    version: integer
  errors:
  - RUN_NOT_FOUND
  - TRAINING_NOT_COMPLETE
  invariants:
  - auto-increments version per name
  - stores model artifact, hyperparams, and eval metrics together
- id: deploy_model
  input:
    model_id: uuid
    environment: string
  output:
    deployment_id: uuid
    endpoint_url: string
  errors:
  - MODEL_NOT_FOUND
  - INVALID_ENVIRONMENT
  - DEPLOYMENT_FAILED
  invariants:
  - 'environments: staging, production'
  - production deploy requires passing eval threshold
  - publishes model_deployed event via BUS
- id: rollback
  input:
    name: string
    target_version: integer
  output:
    rolled_back: boolean
    active_version: integer
  errors:
  - MODEL_NOT_FOUND
  - VERSION_NOT_FOUND
  invariants:
  - swaps deployed version, keeps both artifacts
  - publishes model_rolled_back event via BUS
consumes:
- module: trainer
  interface: get_run_status
  required: true
  contract_version: 1
- module: evaluator
  interface: evaluate_model
  required: true
  contract_version: 1
