module: accounts
version: 1
conventions_version: 2
status: stable
type: regular
purpose: User registration, authentication, and profile management
provides:
- id: register
  input:
    username: string
    email: string
    password: string
  output:
    user_id: uuid
    token: string
  errors:
  - USERNAME_TAKEN
  - EMAIL_TAKEN
  - WEAK_PASSWORD
  invariants:
  - username 3-30 chars, alphanumeric and underscores
  - sends verification email
- id: login
  input:
    email: string
    password: string
  output:
    user_id: uuid
    token: string
  errors:
  - INVALID_CREDENTIALS
  - ACCOUNT_SUSPENDED
  invariants:
  - returns ACCOUNT_SUSPENDED with reason if suspended
- id: get_profile
  input:
    user_id: uuid
  output:
    profile: '{user_id: uuid, username: string, bio: string | null, avatar_url: string | null, joined_at: datetime, post_count:
      integer, reputation: integer}'
  errors:
  - USER_NOT_FOUND
  invariants:
  - reputation computed from upvotes received minus downvotes
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
