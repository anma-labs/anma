module: search
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Full-text search across threads and posts with filters
provides:
- id: search
  input:
    query: string
    category_id: uuid | null
    author_id: uuid | null
    date_from: datetime | null
  output:
    results: '[{type: string, id: uuid, title: string | null, snippet: string, score: float, author: object}]'
    total: integer
  errors:
  - INVALID_QUERY
  invariants:
  - searches thread titles, bodies, and post bodies
  - snippet highlights matched terms
  - excludes hidden and deleted content
  - subscribes to thread_created and post_created events for indexing via BUS
consumes: []
