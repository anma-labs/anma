module: private-messages
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Direct messaging between users with inbox and conversation threading
provides:
- id: send_message
  input:
    sender_id: uuid
    recipient_id: uuid
    subject: string | null
    body: string
  output:
    message_id: uuid
    conversation_id: uuid
  errors:
  - RECIPIENT_NOT_FOUND
  - RECIPIENT_BLOCKED
  - RATE_LIMITED
  invariants:
  - groups messages into conversations by participants
  - publishes message_sent event via BUS
  - 'rate limit: 20 messages per hour'
- id: get_inbox
  input:
    user_id: uuid
    unread_only: boolean
  output:
    conversations: '[{conversation_id: uuid, other_user: object, last_message: object, unread_count: integer}]'
  errors: []
  invariants:
  - sorted by last message timestamp, newest first
- id: get_conversation
  input:
    conversation_id: uuid
    user_id: uuid
  output:
    messages: '[object]'
    other_user: object
  errors:
  - CONVERSATION_NOT_FOUND
  - FORBIDDEN
  invariants:
  - marks all messages as read for the requesting user
  - paginated, 50 per page, newest first
consumes:
- module: accounts
  interface: get_profile
  required: true
  contract_version: 1
