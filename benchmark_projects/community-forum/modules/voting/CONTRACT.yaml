module: voting
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Upvote and downvote posts, compute reputation from vote history
provides:
- id: vote
  input:
    post_id: uuid
    user_id: uuid
    direction: string
  output:
    net_score: integer
    user_reputation_delta: integer
  errors:
  - POST_NOT_FOUND
  - SELF_VOTE
  - ALREADY_VOTED
  invariants:
  - 'directions: up, down'
  - changing vote replaces previous
  - updates author's reputation
  - publishes vote_cast event via BUS
- id: get_votes
  input:
    post_id: uuid
  output:
    upvotes: integer
    downvotes: integer
    net_score: integer
  errors:
  - POST_NOT_FOUND
  invariants:
  - 'reputation impact: +10 per upvote, -2 per downvote on author'
consumes:
- module: posts
  interface: create_post
  required: true
  contract_version: 1
- module: accounts
  interface: get_profile
  required: true
  contract_version: 1
