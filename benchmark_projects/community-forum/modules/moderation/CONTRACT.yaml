module: moderation
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Content flagging, moderator queue, user warnings, and suspensions
provides:
- id: flag_content
  input:
    content_type: string
    content_id: uuid
    reporter_id: uuid
    reason: string
  output:
    flag_id: uuid
    flag_count: integer
  errors:
  - CONTENT_NOT_FOUND
  - ALREADY_FLAGGED
  - INVALID_REASON
  invariants:
  - 'content_type: thread, post'
  - 'reasons: spam, harassment, off_topic, inappropriate'
  - auto-hides content at 5 flags pending review
- id: get_queue
  input:
    status: string | null
  output:
    items: '[{flag_id: uuid, content_type: string, content_id: uuid, reason: string, flag_count: integer, reported_at: datetime}]'
  errors: []
  invariants:
  - 'statuses: pending, reviewed, dismissed'
  - sorted by flag_count descending
- id: take_action
  input:
    flag_id: uuid
    action: string
    notes: string | null
  output:
    success: boolean
  errors:
  - FLAG_NOT_FOUND
  - INVALID_ACTION
  invariants:
  - 'actions: dismiss, warn_user, remove_content, suspend_user'
  - publishes moderation_action event via BUS
consumes:
- module: accounts
  interface: get_profile
  required: true
  contract_version: 1
- module: posts
  interface: delete_post
  required: true
  contract_version: 1
