module: threads
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Create, list, and manage discussion threads with pinning and locking
provides:
- id: create_thread
  input:
    category_id: uuid
    author_id: uuid
    title: string
    body: string
    tags: '[string]'
  output:
    thread_id: uuid
    slug: string
  errors:
  - CATEGORY_NOT_FOUND
  - FORBIDDEN
  - RATE_LIMITED
  invariants:
  - auto-generates slug from title
  - publishes thread_created event via BUS
  - 'rate limit: 5 threads per hour per user'
- id: get_thread
  input:
    thread_id: uuid
  output:
    thread: object
    posts: '[object]'
    post_count: integer
  errors:
  - THREAD_NOT_FOUND
  invariants:
  - increments view count
  - posts paginated, 25 per page, oldest first
- id: list_threads
  input:
    category_id: uuid | null
    sort: string | null
    tag: string | null
  output:
    threads: '[object]'
    total: integer
  errors:
  - CATEGORY_NOT_FOUND
  invariants:
  - 'sort: latest, popular, unanswered'
  - pinned threads always first
- id: lock_thread
  input:
    thread_id: uuid
    reason: string
  output:
    locked: boolean
  errors:
  - THREAD_NOT_FOUND
  - FORBIDDEN
  invariants:
  - only moderators and admins can lock
  - locked threads reject new posts
consumes:
- module: accounts
  interface: get_profile
  required: true
  contract_version: 1
- module: categories
  interface: list_categories
  required: true
  contract_version: 1
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
