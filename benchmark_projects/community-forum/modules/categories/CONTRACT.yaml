module: categories
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Organize threads into hierarchical categories with access controls
provides:
- id: create_category
  input:
    name: string
    description: string
    parent_id: uuid | null
    access_level: string
  output:
    category_id: uuid
    slug: string
  errors:
  - NAME_EXISTS
  - PARENT_NOT_FOUND
  - MAX_DEPTH_EXCEEDED
  invariants:
  - 'max nesting depth: 3 levels'
  - 'access_levels: public, members, restricted'
- id: list_categories
  input: {}
  output:
    categories: '[{category_id: uuid, name: string, slug: string, thread_count: integer, last_post_at: datetime | null, children:
      [object]}]'
  errors: []
  invariants:
  - returns nested tree structure
  - thread_count includes all descendants
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
