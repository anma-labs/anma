module: posts
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Create, edit, and delete replies within threads with quoting support
provides:
- id: create_post
  input:
    thread_id: uuid
    author_id: uuid
    body: string
    reply_to_id: uuid | null
  output:
    post_id: uuid
    position: integer
  errors:
  - THREAD_NOT_FOUND
  - THREAD_LOCKED
  - FORBIDDEN
  - RATE_LIMITED
  invariants:
  - position is sequential within thread
  - publishes post_created event via BUS
  - 'rate limit: 10 posts per 5 minutes'
- id: edit_post
  input:
    post_id: uuid
    body: string
  output:
    post: object
    edit_count: integer
  errors:
  - POST_NOT_FOUND
  - FORBIDDEN
  - EDIT_WINDOW_CLOSED
  invariants:
  - 'edit window: 30 minutes after creation unless moderator'
  - stores previous versions
- id: delete_post
  input:
    post_id: uuid
  output:
    deleted: boolean
  errors:
  - POST_NOT_FOUND
  - FORBIDDEN
  invariants:
  - soft delete — shows [deleted] placeholder to preserve thread flow
consumes:
- module: threads
  interface: get_thread
  required: true
  contract_version: 1
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
