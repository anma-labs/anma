module: notifications
version: 1
conventions_version: 2
status: draft
type: regular
purpose: In-app notifications for replies, mentions, votes, and moderation actions
provides:
- id: get_notifications
  input:
    user_id: uuid
    unread_only: boolean
  output:
    notifications: '[{id: uuid, type: string, message: string, link: string, read: boolean, created_at: datetime}]'
  errors: []
  invariants:
  - 'types: reply, mention, upvote, badge, moderation'
  - max 100 per request
  - subscribes to post_created, vote_cast, moderation_action events via BUS
- id: mark_read
  input:
    notification_ids: '[uuid]'
    user_id: uuid
  output:
    updated: integer
  errors: []
  invariants:
  - idempotent
consumes:
- module: accounts
  interface: get_profile
  required: true
  contract_version: 1
