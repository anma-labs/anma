module: entries
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Create, edit, publish, and version content entries against defined types
provides:
- id: create_entry
  input:
    type_id: uuid
    data: object
    locale: string | null
  output:
    entry_id: uuid
    version: integer
  errors:
  - TYPE_NOT_FOUND
  - VALIDATION_FAILED
  - INVALID_LOCALE
  invariants:
  - validates data against type schema
  - starts as draft, version 1
  - locale defaults to default_locale from config
- id: update_entry
  input:
    entry_id: uuid
    data: object
  output:
    entry_id: uuid
    version: integer
  errors:
  - ENTRY_NOT_FOUND
  - VALIDATION_FAILED
  - LOCKED
  invariants:
  - creates new version, preserves all previous versions
  - publishes entry_updated event via BUS
- id: publish_entry
  input:
    entry_id: uuid
    version: integer | null
  output:
    published_version: integer
    published_at: datetime
  errors:
  - ENTRY_NOT_FOUND
  - VERSION_NOT_FOUND
  - VALIDATION_FAILED
  invariants:
  - null version publishes latest
  - validates all required fields populated
  - publishes entry_published event via BUS
- id: list_entries
  input:
    type_id: uuid | null
    status: string | null
    locale: string | null
  output:
    entries: '[object]'
    total: integer
  errors:
  - TYPE_NOT_FOUND
  invariants:
  - 'statuses: draft, published, archived'
  - paginated, 25 per page
- id: get_entry
  input:
    entry_id: uuid
    version: integer | null
  output:
    entry: object
    versions: '[integer]'
  errors:
  - ENTRY_NOT_FOUND
  - VERSION_NOT_FOUND
  invariants:
  - null version returns published version, or latest draft if unpublished
consumes:
- module: content-types
  interface: create_type
  required: true
  contract_version: 1
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
