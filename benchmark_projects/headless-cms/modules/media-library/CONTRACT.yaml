module: media-library
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Upload, organize, transform, and serve media assets with CDN integration
provides:
- id: upload_media
  input:
    file_name: string
    content_type: string
    size_bytes: integer
  output:
    media_id: uuid
    upload_url: string
    cdn_url: string
  errors:
  - FILE_TOO_LARGE
  - UNSUPPORTED_TYPE
  invariants:
  - max file size 50MB
  - returns presigned upload URL
  - 'supported: image/*, video/mp4, application/pdf, audio/*'
- id: get_media
  input:
    media_id: uuid
    transform: '{width: integer, height: integer, format: string} | null'
  output:
    url: string
    metadata: '{width: integer | null, height: integer | null, size_bytes: integer, content_type: string}'
  errors:
  - MEDIA_NOT_FOUND
  - TRANSFORM_ERROR
  invariants:
  - transforms cached after first request
  - 'format conversion: webp, avif, jpeg, png'
- id: list_media
  input:
    folder: string | null
    content_type: string | null
  output:
    media: '[object]'
    total: integer
  errors: []
  invariants:
  - paginated, 50 per page
  - includes usage count (how many entries reference this media)
consumes: []
