module: user-roles
version: 1
conventions_version: 2
status: draft
type: regular
purpose: CMS user accounts with role-based access control per content type
provides:
- id: create_user
  input:
    email: string
    role: string
  output:
    user_id: uuid
    invite_sent: boolean
  errors:
  - EMAIL_EXISTS
  - INVALID_ROLE
  invariants:
  - 'roles: admin, editor, author, viewer'
  - sends email invitation
- id: set_permissions
  input:
    user_id: uuid
    type_id: uuid
    permissions: '[string]'
  output:
    success: boolean
  errors:
  - USER_NOT_FOUND
  - TYPE_NOT_FOUND
  - INVALID_PERMISSION
  invariants:
  - 'permissions: create, read, update, publish, delete'
  - admin role bypasses per-type permissions
- id: check_permission
  input:
    user_id: uuid
    type_id: uuid
    permission: string
  output:
    allowed: boolean
  errors:
  - USER_NOT_FOUND
  invariants:
  - admin always returns true
  - returns false for unknown types rather than erroring
consumes: []
