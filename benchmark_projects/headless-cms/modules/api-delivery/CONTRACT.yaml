module: api-delivery
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Public read-only API for consuming published content with caching
provides:
- id: get_content
  input:
    type_slug: string
    entry_slug: string | null
    locale: string | null
  output:
    content: object | [object]
    cache_ttl: integer
  errors:
  - TYPE_NOT_FOUND
  - ENTRY_NOT_FOUND
  - LOCALE_NOT_FOUND
  invariants:
  - only returns published entries
  - null entry_slug returns list for type
  - cache_ttl based on type configuration
  - subscribes to entry_published event to invalidate cache via BUS
- id: preview_content
  input:
    entry_id: uuid
    version: integer | null
    preview_token: string
  output:
    content: object
  errors:
  - ENTRY_NOT_FOUND
  - INVALID_PREVIEW_TOKEN
  invariants:
  - returns draft/unpublished versions
  - preview_token expires after 1 hour
  - never cached
consumes:
- module: entries
  interface: get_entry
  required: true
  contract_version: 1
- module: entries
  interface: list_entries
  required: true
  contract_version: 1
