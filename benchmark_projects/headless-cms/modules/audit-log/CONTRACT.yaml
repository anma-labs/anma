module: audit-log
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Track all content changes with who, what, when for compliance and undo
provides:
- id: get_log
  input:
    entry_id: uuid | null
    user_id: uuid | null
    action: string | null
    from: datetime | null
    to: datetime | null
  output:
    events: '[{event_id: uuid, user_id: uuid, action: string, entry_id: uuid | null, timestamp: datetime, details: object}]'
    total: integer
  errors: []
  invariants:
  - at least one filter required
  - 'actions: create, update, publish, unpublish, delete, permission_change'
  - subscribes to all entry and permission events via BUS
  - paginated, 50 per page
consumes: []
