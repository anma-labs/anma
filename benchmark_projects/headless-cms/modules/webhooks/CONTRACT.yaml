module: webhooks
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Notify external systems on content events via configurable webhooks
provides:
- id: register_webhook
  input:
    url: string
    events: '[string]'
    secret: string | null
  output:
    webhook_id: uuid
  errors:
  - INVALID_URL
  - INVALID_EVENT
  invariants:
  - 'events: entry.published, entry.updated, entry.deleted, media.uploaded'
  - signs payload with HMAC-SHA256 if secret provided
  - subscribes to all registered events via BUS
- id: list_webhooks
  input: {}
  output:
    webhooks: '[{webhook_id: uuid, url: string, events: [string], active: boolean, last_triggered: datetime | null, failure_count:
      integer}]'
  errors: []
  invariants:
  - auto-disables after 10 consecutive failures
consumes: []
