module: content-types
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Define and manage content type schemas with field validation rules
provides:
- id: create_type
  input:
    name: string
    fields: '[{name: string, type: string, required: boolean, validation: object | null}]'
  output:
    type_id: uuid
    slug: string
  errors:
  - NAME_EXISTS
  - INVALID_FIELD_TYPE
  invariants:
  - 'field types: text, richtext, number, boolean, date, media, reference, json'
  - slug auto-generated, unique
  - publishes type_created event via BUS
- id: update_type
  input:
    type_id: uuid
    fields: '[object]'
  output:
    type: object
    migration_needed: boolean
  errors:
  - TYPE_NOT_FOUND
  - BREAKING_CHANGE
  invariants:
  - removing required fields is a breaking change
  - adding optional fields is safe
- id: list_types
  input: {}
  output:
    types: '[{type_id: uuid, name: string, slug: string, field_count: integer, entry_count: integer}]'
  errors: []
  invariants:
  - includes count of entries for each type
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
