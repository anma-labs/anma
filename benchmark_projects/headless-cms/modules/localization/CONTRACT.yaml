module: localization
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Manage locales, translate entries, and track translation completeness
provides:
- id: add_locale
  input:
    code: string
    name: string
  output:
    locale_id: uuid
  errors:
  - LOCALE_EXISTS
  - INVALID_CODE
  invariants:
  - code must be valid ISO 639-1 or BCP 47 tag
- id: get_translation_status
  input:
    type_id: uuid | null
  output:
    locales: '[{code: string, total_entries: integer, translated: integer, percentage: float}]'
  errors: []
  invariants:
  - null type_id returns aggregate across all types
consumes:
- module: entries
  interface: list_entries
  required: true
  contract_version: 1
