module: expense-entry
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Create, categorize, and manage individual expense records
provides:
- id: create_expense
  input:
    user_id: uuid
    amount_cents: integer
    currency: string
    category: string
    merchant: string | null
    date: string
    notes: string | null
    receipt_id: uuid | null
  output:
    expense_id: uuid
  errors:
  - INVALID_CURRENCY
  - INVALID_CATEGORY
  - INVALID_DATE
  - RECEIPT_NOT_FOUND
  invariants:
  - currency must be valid ISO 4217 code
  - 'categories: food, transport, housing, utilities, entertainment, health, shopping, other'
  - publishes expense_created event via BUS
- id: update_expense
  input:
    expense_id: uuid
    fields: object
  output:
    expense: object
  errors:
  - EXPENSE_NOT_FOUND
  - FORBIDDEN
  - ALREADY_SUBMITTED
  invariants:
  - cannot edit submitted or approved expenses
  - tracks modification history
- id: list_expenses
  input:
    user_id: uuid
    from_date: string | null
    to_date: string | null
    category: string | null
    status: string | null
  output:
    expenses: '[object]'
    total_cents: integer
    count: integer
  errors: []
  invariants:
  - 'statuses: draft, submitted, approved, rejected, reimbursed'
  - sorted by date descending
- id: delete_expense
  input:
    expense_id: uuid
  output:
    deleted: boolean
  errors:
  - EXPENSE_NOT_FOUND
  - FORBIDDEN
  - ALREADY_SUBMITTED
  invariants:
  - only draft expenses can be deleted
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
