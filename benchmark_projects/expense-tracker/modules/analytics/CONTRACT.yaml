module: analytics
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Spending trends, category breakdowns, and year-over-year comparisons
provides:
- id: get_spending_summary
  input:
    user_id: uuid
    period: string
    group_by: string
  output:
    data: '[{label: string, total_cents: integer, count: integer}]'
    grand_total_cents: integer
  errors:
  - INVALID_PERIOD
  - INVALID_GROUP_BY
  invariants:
  - 'periods: week, month, quarter, year'
  - 'group_by: category, merchant, week, month'
  - only includes approved and reimbursed expenses
- id: get_trends
  input:
    user_id: uuid
    category: string | null
    months: integer
  output:
    data_points: '[{month: string, total_cents: integer, budget_cents: integer | null}]'
  errors:
  - INVALID_CATEGORY
  invariants:
  - max 24 months
  - includes budget comparison if budget exists for category
  - subscribes to expense_created and report_approved events via BUS
consumes:
- module: expense-entry
  interface: list_expenses
  required: true
  contract_version: 1
- module: budgets
  interface: get_budget_status
  required: false
  contract_version: 1
