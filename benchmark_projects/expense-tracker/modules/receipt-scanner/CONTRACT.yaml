module: receipt-scanner
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Upload and OCR receipts, auto-extract amount, merchant, and date
provides:
- id: upload_receipt
  input:
    user_id: uuid
    file_name: string
    content_type: string
  output:
    receipt_id: uuid
    upload_url: string
  errors:
  - UNSUPPORTED_FORMAT
  - FILE_TOO_LARGE
  invariants:
  - 'supported: image/jpeg, image/png, application/pdf'
  - max 10MB
  - returns presigned upload URL
- id: extract_data
  input:
    receipt_id: uuid
  output:
    extracted: '{amount_cents: integer | null, currency: string | null, merchant: string | null, date: string | null, confidence:
      float}'
    raw_text: string
  errors:
  - RECEIPT_NOT_FOUND
  - EXTRACTION_FAILED
  invariants:
  - confidence 0.0-1.0 for overall extraction quality
  - null fields mean extraction failed for that field
  - publishes receipt_processed event via BUS
consumes: []
