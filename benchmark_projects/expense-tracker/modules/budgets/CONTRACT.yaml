module: budgets
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Set monthly category budgets and track spending against limits
provides:
- id: set_budget
  input:
    user_id: uuid
    category: string
    monthly_limit_cents: integer
    currency: string
  output:
    budget_id: uuid
  errors:
  - INVALID_CATEGORY
  - INVALID_CURRENCY
  - BUDGET_EXISTS
  invariants:
  - one budget per category per user
  - replaces existing if BUDGET_EXISTS and force=true
- id: get_budget_status
  input:
    user_id: uuid
    month: string | null
  output:
    budgets: '[{category: string, limit_cents: integer, spent_cents: integer, remaining_cents: integer, percentage: float}]'
  errors:
  - INVALID_MONTH
  invariants:
  - null month defaults to current month
  - subscribes to expense_created events to update spent amounts via BUS
  - publishes budget_exceeded event via BUS at 100%
consumes:
- module: expense-entry
  interface: list_expenses
  required: true
  contract_version: 1
