module: reports
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Generate expense reports for submission, approval, and export
provides:
- id: create_report
  input:
    user_id: uuid
    title: string
    expense_ids: '[uuid]'
  output:
    report_id: uuid
    total_cents: integer
    expense_count: integer
  errors:
  - EXPENSE_NOT_FOUND
  - ALREADY_IN_REPORT
  - MIXED_CURRENCIES
  invariants:
  - all expenses must be in same currency
  - only draft expenses can be added to report
- id: submit_report
  input:
    report_id: uuid
  output:
    submitted_at: datetime
    approver_id: uuid | null
  errors:
  - REPORT_NOT_FOUND
  - EMPTY_REPORT
  - ALREADY_SUBMITTED
  invariants:
  - marks all included expenses as submitted
  - routes to approver based on amount thresholds
  - publishes report_submitted event via BUS
- id: approve_report
  input:
    report_id: uuid
    approver_id: uuid
    approved: boolean
    notes: string | null
  output:
    status: string
  errors:
  - REPORT_NOT_FOUND
  - NOT_SUBMITTED
  - FORBIDDEN
  invariants:
  - approved=false returns to draft with rejection notes
  - approved=true marks expenses as approved
  - publishes report_approved event via BUS
- id: export_report
  input:
    report_id: uuid
    format: string
  output:
    download_url: string
  errors:
  - REPORT_NOT_FOUND
  - INVALID_FORMAT
  invariants:
  - 'formats: pdf, csv'
  - PDF includes receipt images if attached
consumes:
- module: expense-entry
  interface: list_expenses
  required: true
  contract_version: 1
- module: receipt-scanner
  interface: extract_data
  required: false
  contract_version: 1
