module: goals
version: 1
conventions_version: 2
status: draft
type: regular
purpose: 'Set and track fitness goals: weight targets, workout frequency, nutrition targets'
provides:
- id: create_goal
  input:
    user_id: uuid
    type: string
    target: object
    deadline: datetime | null
  output:
    goal_id: uuid
  errors:
  - INVALID_TYPE
  - CONFLICTING_GOAL
  invariants:
  - 'types: weight_loss, weight_gain, workout_frequency, calorie_target, macro_target'
  - only one active goal per type
  - subscribes to workout_logged and profile_updated events via BUS
- id: get_progress
  input:
    user_id: uuid
    goal_id: uuid | null
  output:
    goals: '[{goal_id: uuid, type: string, target: object, current: object, progress_pct: float, on_track: boolean}]'
  errors:
  - GOAL_NOT_FOUND
  invariants:
  - null goal_id returns all active goals
  - on_track based on linear projection to deadline
consumes:
- module: user-profiles
  interface: get_profile
  required: true
  contract_version: 1
- module: workout-tracker
  interface: get_history
  required: true
  contract_version: 1
- module: nutrition
  interface: get_daily_summary
  required: false
  contract_version: 1
