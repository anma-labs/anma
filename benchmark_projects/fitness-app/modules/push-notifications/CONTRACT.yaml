module: push-notifications
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Workout reminders, goal milestones, and social activity notifications
provides:
- id: register_device
  input:
    user_id: uuid
    device_token: string
    platform: string
  output:
    device_id: uuid
  errors:
  - INVALID_PLATFORM
  invariants:
  - 'platforms: ios, android'
  - replaces existing token for same user+platform
- id: send_push
  input:
    user_id: uuid
    title: string
    body: string
    data: object | null
  output:
    sent: boolean
    devices_reached: integer
  errors:
  - USER_NOT_FOUND
  - NO_DEVICES
  invariants:
  - sends to all registered devices for user
  - subscribes to workout_logged and goal milestone events via BUS
consumes:
- module: user-profiles
  interface: get_profile
  required: true
  contract_version: 1
