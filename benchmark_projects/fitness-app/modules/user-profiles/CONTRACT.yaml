module: user-profiles
version: 1
conventions_version: 2
status: stable
type: regular
purpose: User accounts with fitness stats, body measurements, and preferences
provides:
- id: create_profile
  input:
    user_id: uuid
    display_name: string
    height_cm: float | null
    weight_kg: float | null
    birth_year: integer | null
  output:
    profile_id: uuid
  errors:
  - PROFILE_EXISTS
  invariants:
  - all measurements optional at creation
  - publishes profile_created event via BUS
- id: get_profile
  input:
    user_id: uuid
  output:
    profile: object
  errors:
  - PROFILE_NOT_FOUND
  invariants:
  - 'includes computed fields: bmi, age, account_age_days'
- id: update_measurements
  input:
    user_id: uuid
    weight_kg: float | null
    body_fat_pct: float | null
  output:
    profile: object
    weight_history: '[{date: string, weight_kg: float}]'
  errors:
  - PROFILE_NOT_FOUND
  invariants:
  - stores historical weight entries, never overwrites
  - returns last 30 entries
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
