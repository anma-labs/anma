module: exercise-library
version: 1
conventions_version: 2
status: frozen
type: regular
purpose: Exercise database with descriptions, muscle groups, and instructional content
provides:
- id: get_exercise
  input:
    exercise_id: string
  output:
    exercise: '{id: string, name: string, muscle_groups: [string], equipment: [string], instructions: string, difficulty:
      string}'
  errors:
  - EXERCISE_NOT_FOUND
  invariants:
  - 'difficulty: beginner, intermediate, advanced'
- id: search_exercises
  input:
    query: string | null
    muscle_group: string | null
    equipment: string | null
  output:
    exercises: '[object]'
  errors: []
  invariants:
  - at least one filter required
  - max 50 results sorted by relevance
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: forbidden
  removing_interface: forbidden
