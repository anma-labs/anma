module: nutrition
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Daily food logging, calorie and macro tracking, and meal templates
provides:
- id: log_meal
  input:
    user_id: uuid
    meal_type: string
    foods: '[{food_id: string, serving_size: float, unit: string}]'
  output:
    meal_id: uuid
    totals: '{calories: integer, protein_g: float, carbs_g: float, fat_g: float}'
  errors:
  - FOOD_NOT_FOUND
  - INVALID_MEAL_TYPE
  invariants:
  - 'meal_types: breakfast, lunch, dinner, snack'
  - calculates macros from food database entries
- id: get_daily_summary
  input:
    user_id: uuid
    date: string
  output:
    meals: '[object]'
    totals: '{calories: integer, protein_g: float, carbs_g: float, fat_g: float}'
    goal_progress: object | null
  errors: []
  invariants:
  - returns empty meals array for days with no logs
  - goal_progress included if user has active nutrition goal
- id: search_foods
  input:
    query: string
  output:
    results: '[{food_id: string, name: string, calories_per_100g: integer, macros_per_100g: object}]'
  errors: []
  invariants:
  - searches internal database plus verified community entries
  - max 50 results
consumes:
- module: user-profiles
  interface: get_profile
  required: true
  contract_version: 1
