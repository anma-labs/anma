module: workout-tracker
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Log workouts, track sets/reps/weight, and calculate volume and PRs
provides:
- id: log_workout
  input:
    user_id: uuid
    exercises: '[{exercise_id: string, sets: [{reps: integer, weight_kg: float, rpe: integer | null}]}]'
    duration_minutes: integer
    notes: string | null
  output:
    workout_id: uuid
    total_volume_kg: float
    personal_records: '[{exercise_id: string, type: string, value: float}]'
  errors:
  - INVALID_EXERCISE
  - INVALID_SETS
  invariants:
  - volume = sum of (reps * weight) across all sets
  - 'auto-detects PRs: max weight, max reps, max volume per exercise'
  - publishes workout_logged event via BUS
- id: get_history
  input:
    user_id: uuid
    exercise_id: string | null
    limit: integer | null
  output:
    workouts: '[object]'
    total: integer
  errors: []
  invariants:
  - newest first, default limit 20
  - if exercise_id provided, filters to that exercise only
- id: get_exercise_stats
  input:
    user_id: uuid
    exercise_id: string
  output:
    personal_records: object
    total_volume_kg: float
    session_count: integer
    last_performed: datetime | null
  errors:
  - INVALID_EXERCISE
  invariants:
  - 'PRs include: max_weight, max_reps, max_single_set_volume'
consumes:
- module: user-profiles
  interface: get_profile
  required: true
  contract_version: 1
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
