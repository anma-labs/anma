module: social
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Follow users, activity feed, and group fitness challenges
provides:
- id: follow_user
  input:
    follower_id: uuid
    following_id: uuid
  output:
    success: boolean
  errors:
  - USER_NOT_FOUND
  - ALREADY_FOLLOWING
  - CANNOT_FOLLOW_SELF
  invariants:
  - publishes follow_created event via BUS
- id: get_feed
  input:
    user_id: uuid
    limit: integer | null
  output:
    items: '[{type: string, user_id: uuid, username: string, data: object, timestamp: datetime}]'
  errors: []
  invariants:
  - includes workout_logged and goal_completed events from followed users
  - newest first, default limit 30
- id: create_challenge
  input:
    creator_id: uuid
    name: string
    type: string
    target: object
    duration_days: integer
  output:
    challenge_id: uuid
    invite_code: string
  errors:
  - INVALID_TYPE
  invariants:
  - 'challenge types: total_workouts, total_volume, streak_days'
  - max 20 participants
consumes:
- module: user-profiles
  interface: get_profile
  required: true
  contract_version: 1
- module: workout-tracker
  interface: get_history
  required: true
  contract_version: 1
