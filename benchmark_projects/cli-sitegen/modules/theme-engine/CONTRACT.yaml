module: theme-engine
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Load and apply HTML templates with CSS themes to parsed content
provides:
- id: load_theme
  input:
    theme_name: string
  output:
    theme: '{name: string, templates: [string], assets: [string]}'
  errors:
  - THEME_NOT_FOUND
  - INVALID_THEME
  invariants:
  - 'theme must contain at least: base.html, page.html, index.html'
  - validates all template variables resolve
- id: render_page
  input:
    ast: object
    frontmatter: object
    theme: object
    site_config: object
  output:
    html: string
    assets_used: '[string]'
  errors:
  - TEMPLATE_ERROR
  - MISSING_VARIABLE
  invariants:
  - injects site_config variables into template context
  - auto-generates table of contents for pages with 3+ headings
- id: list_themes
  input:
    themes_dir: string
  output:
    themes: '[{name: string, description: string, preview: string | null}]'
  errors:
  - DIR_NOT_FOUND
  invariants:
  - reads theme.yaml from each subdirectory for metadata
consumes:
- module: parser
  interface: parse_file
  required: true
  contract_version: 1
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
