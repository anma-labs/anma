module: builder
version: 1
conventions_version: 2
status: draft
type: regular
purpose: 'Orchestrate full site build: parse all content, apply themes, write output'
provides:
- id: build_site
  input:
    source_dir: string
    output_dir: string
    config_path: string
  output:
    pages_built: integer
    assets_copied: integer
    build_time_ms: integer
    warnings: '[string]'
  errors:
  - CONFIG_NOT_FOUND
  - BUILD_FAILED
  - OUTPUT_DIR_NOT_WRITABLE
  invariants:
  - cleans output dir before build
  - generates sitemap.xml and RSS feed
  - publishes build_complete event via BUS
- id: build_incremental
  input:
    source_dir: string
    output_dir: string
    changed_files: '[string]'
  output:
    pages_rebuilt: integer
    build_time_ms: integer
  errors:
  - BUILD_FAILED
  invariants:
  - only rebuilds changed pages and their dependents
  - updates sitemap and RSS incrementally
consumes:
- module: parser
  interface: parse_directory
  required: true
  contract_version: 1
- module: theme-engine
  interface: render_page
  required: true
  contract_version: 1
- module: theme-engine
  interface: load_theme
  required: true
  contract_version: 1
