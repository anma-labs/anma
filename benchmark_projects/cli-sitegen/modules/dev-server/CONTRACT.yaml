module: dev-server
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Local development server with live reload on file changes
provides:
- id: start_server
  input:
    source_dir: string
    port: integer | null
  output:
    url: string
    pid: integer
  errors:
  - PORT_IN_USE
  - BUILD_FAILED
  invariants:
  - defaults to port 3000
  - watches source files and triggers incremental rebuild
  - injects live-reload script into served HTML
- id: stop_server
  input:
    pid: integer
  output:
    success: boolean
  errors:
  - SERVER_NOT_RUNNING
  invariants:
  - cleans up temp files on stop
consumes:
- module: builder
  interface: build_site
  required: true
  contract_version: 1
- module: builder
  interface: build_incremental
  required: true
  contract_version: 1
