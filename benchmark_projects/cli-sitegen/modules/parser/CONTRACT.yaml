module: parser
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Parse markdown files into structured AST with frontmatter extraction
provides:
- id: parse_file
  input:
    file_path: string
  output:
    ast: object
    frontmatter: '{title: string, date: datetime | null, tags: [string], template: string | null}'
    word_count: integer
  errors:
  - FILE_NOT_FOUND
  - PARSE_ERROR
  - INVALID_FRONTMATTER
  invariants:
  - supports CommonMark plus tables and footnotes
  - frontmatter is YAML between --- delimiters
- id: parse_directory
  input:
    dir_path: string
    recursive: boolean
  output:
    pages: '[{path: string, ast: object, frontmatter: object}]'
    errors: '[{path: string, error: string}]'
  errors:
  - DIR_NOT_FOUND
  invariants:
  - continues on individual file errors
  - returns both successes and failures
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
