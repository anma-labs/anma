module: monitoring
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Track pipeline health, data quality metrics, and alerting on failures
provides:
- id: get_metrics
  input:
    pipeline_name: string | null
    period: string
  output:
    runs_total: integer
    success_rate: float
    avg_duration_seconds: float
    records_per_run: float
    error_breakdown: object
  errors:
  - INVALID_PERIOD
  invariants:
  - 'valid periods: hour, day, week, month'
  - null pipeline_name returns aggregate across all pipelines
  - subscribes to pipeline_complete and load_complete events via BUS
- id: set_alert
  input:
    pipeline_name: string
    condition: string
    channel: string
  output:
    alert_id: uuid
  errors:
  - INVALID_CONDITION
  - INVALID_CHANNEL
  invariants:
  - 'conditions: failure, slow (>2x avg), data_quality_drop'
  - 'channels: email, slack_webhook'
consumes:
- module: scheduler
  interface: get_run_history
  required: true
  contract_version: 1
