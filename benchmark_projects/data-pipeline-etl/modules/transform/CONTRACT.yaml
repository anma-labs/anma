module: transform
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Clean, validate, reshape, and enrich extracted records using declarative rules
provides:
- id: apply_transforms
  input:
    records: '[object]'
    rules: '[{type: string, config: object}]'
  output:
    records: '[object]'
    dropped_count: integer
    error_count: integer
    applied_rules: '[string]'
  errors:
  - INVALID_RULE
  - TRANSFORM_FAILED
  invariants:
  - 'rule types: rename, cast, filter, deduplicate, derive, validate'
  - rules applied in order — order matters for dependencies
  - dropped records logged with reason
- id: validate_schema
  input:
    records: '[object]'
    schema: object
  output:
    valid_count: integer
    invalid_count: integer
    errors: '[{row: integer, field: string, error: string}]'
  errors:
  - INVALID_SCHEMA
  invariants:
  - validates types, required fields, and custom constraints
  - returns all errors, not just first
consumes:
- module: source-connectors
  interface: extract_csv
  required: false
  contract_version: 1
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
