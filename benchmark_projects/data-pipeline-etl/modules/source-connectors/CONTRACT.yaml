module: source-connectors
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Connect to and extract data from CSV files, REST APIs, and database exports
provides:
- id: extract_csv
  input:
    file_path: string
    delimiter: string | null
    encoding: string | null
  output:
    records: '[object]'
    row_count: integer
    columns: '[string]'
    inferred_types: '{column: string}'
  errors:
  - FILE_NOT_FOUND
  - PARSE_ERROR
  - ENCODING_ERROR
  invariants:
  - auto-detects delimiter if not specified
  - handles quoted fields and escaped characters
  - streams rows for files over 100MB
- id: extract_api
  input:
    url: string
    method: string
    headers: object | null
    pagination: '{type: string, param: string} | null'
  output:
    records: '[object]'
    total_fetched: integer
    pages_fetched: integer
  errors:
  - CONNECTION_FAILED
  - AUTH_ERROR
  - RATE_LIMITED
  - INVALID_RESPONSE
  invariants:
  - supports cursor and offset pagination
  - retries 3 times with exponential backoff on 5xx errors
  - respects rate limit headers
- id: list_sources
  input:
    config_path: string
  output:
    sources: '[{name: string, type: string, last_run: datetime | null, status: string}]'
  errors:
  - CONFIG_NOT_FOUND
  invariants:
  - reads sources.yaml for registered source definitions
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
