module: scheduler
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Schedule and orchestrate pipeline runs with dependency ordering and retry logic
provides:
- id: create_schedule
  input:
    pipeline_name: string
    cron: string
    steps: '[{source: string, transforms: [object], destination: string}]'
  output:
    schedule_id: uuid
  errors:
  - INVALID_CRON
  - PIPELINE_EXISTS
  - INVALID_STEP
  invariants:
  - validates cron expression format
  - steps execute sequentially in order
- id: run_pipeline
  input:
    pipeline_name: string
  output:
    run_id: uuid
    started_at: datetime
  errors:
  - PIPELINE_NOT_FOUND
  - ALREADY_RUNNING
  invariants:
  - prevents concurrent runs of same pipeline
  - publishes pipeline_started and pipeline_complete events via BUS
- id: get_run_history
  input:
    pipeline_name: string
    limit: integer | null
  output:
    runs: '[{run_id: uuid, status: string, started_at: datetime, completed_at: datetime | null, records_processed: integer}]'
  errors:
  - PIPELINE_NOT_FOUND
  invariants:
  - newest first, default limit 20
consumes:
- module: source-connectors
  interface: extract_csv
  required: true
  contract_version: 1
- module: source-connectors
  interface: extract_api
  required: true
  contract_version: 1
- module: transform
  interface: apply_transforms
  required: true
  contract_version: 1
- module: loader
  interface: load_batch
  required: true
  contract_version: 1
