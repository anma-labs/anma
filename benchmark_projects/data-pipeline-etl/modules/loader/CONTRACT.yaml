module: loader
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Load transformed records into destination tables with upsert and append modes
provides:
- id: load_batch
  input:
    records: '[object]'
    destination: string
    mode: string
  output:
    inserted: integer
    updated: integer
    failed: integer
    load_id: uuid
  errors:
  - DESTINATION_NOT_FOUND
  - SCHEMA_MISMATCH
  - LOAD_FAILED
  invariants:
  - 'valid modes: append, upsert, replace'
  - upsert requires primary_key in destination config
  - publishes load_complete event via BUS with load_id and stats
- id: get_load_status
  input:
    load_id: uuid
  output:
    status: string
    records_processed: integer
    errors: '[string]'
  errors:
  - LOAD_NOT_FOUND
  invariants:
  - 'statuses: pending, running, complete, failed'
consumes:
- module: transform
  interface: apply_transforms
  required: true
  contract_version: 1
