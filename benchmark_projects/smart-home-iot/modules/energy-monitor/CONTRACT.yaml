module: energy-monitor
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Track energy consumption per device and room, cost estimation, and usage alerts
provides:
- id: get_usage
  input:
    device_id: string | null
    room: string | null
    period: string
  output:
    total_kwh: float
    cost_estimate_cents: integer
    breakdown: '[{device_id: string, kwh: float}]'
  errors:
  - INVALID_PERIOD
  invariants:
  - 'valid periods: day, week, month'
  - cost based on configured rate_per_kwh
  - subscribes to sensor_reading events for power_usage metric via BUS
- id: set_budget
  input:
    monthly_budget_cents: integer
  output:
    budget_id: uuid
  errors:
  - INVALID_BUDGET
  invariants:
  - publishes budget_alert event via BUS at 80% and 100% thresholds
consumes:
- module: sensor-data
  interface: query_readings
  required: true
  contract_version: 1
