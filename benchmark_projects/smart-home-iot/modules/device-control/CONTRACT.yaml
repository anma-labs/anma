module: device-control
version: 1
conventions_version: 2
status: stable
type: regular
purpose: 'Send commands to devices: toggle, set level, set temperature, lock/unlock'
provides:
- id: send_command
  input:
    device_id: string
    command: string
    params: object | null
  output:
    success: boolean
    device_state: object
    response_time_ms: integer
  errors:
  - DEVICE_NOT_FOUND
  - DEVICE_OFFLINE
  - INVALID_COMMAND
  - COMMAND_TIMEOUT
  invariants:
  - 'commands: on, off, set_level, set_temperature, lock, unlock, set_color'
  - timeout after 5 seconds
  - publishes device_state_changed event via BUS
- id: get_state
  input:
    device_id: string
  output:
    state: object
    last_updated: datetime
  errors:
  - DEVICE_NOT_FOUND
  invariants:
  - returns cached state if device offline, with stale flag
- id: batch_command
  input:
    commands: '[{device_id: string, command: string, params: object | null}]'
  output:
    results: '[{device_id: string, success: boolean, error: string | null}]'
  errors: []
  invariants:
  - executes in parallel, returns all results
  - max 20 commands per batch
consumes:
- module: device-registry
  interface: list_devices
  required: true
  contract_version: 1
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
