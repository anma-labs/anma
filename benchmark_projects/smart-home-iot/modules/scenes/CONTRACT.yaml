module: scenes
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Predefined multi-device configurations activated with a single command
provides:
- id: create_scene
  input:
    name: string
    devices: '[{device_id: string, state: object}]'
  output:
    scene_id: uuid
  errors:
  - DEVICE_NOT_FOUND
  - NAME_EXISTS
  invariants:
  - validates all device_ids exist at creation time
- id: activate_scene
  input:
    scene_id: uuid
  output:
    results: '[{device_id: string, success: boolean}]'
  errors:
  - SCENE_NOT_FOUND
  invariants:
  - uses batch_command internally
  - publishes scene_activated event via BUS
- id: list_scenes
  input: {}
  output:
    scenes: '[{scene_id: uuid, name: string, device_count: integer, last_activated: datetime | null}]'
  errors: []
  invariants:
  - sorted alphabetically by name
consumes:
- module: device-control
  interface: batch_command
  required: true
  contract_version: 1
