module: sensor-data
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Collect, store, and query time-series data from temperature, motion, and humidity sensors
provides:
- id: ingest_reading
  input:
    device_id: string
    metric: string
    value: float
    timestamp: datetime | null
  output:
    stored: boolean
  errors:
  - DEVICE_NOT_FOUND
  - INVALID_METRIC
  invariants:
  - 'metrics: temperature, humidity, motion, light_level, co2, power_usage'
  - publishes sensor_reading event via BUS for threshold checks
  - null timestamp defaults to now
- id: query_readings
  input:
    device_id: string
    metric: string
    from: datetime
    to: datetime
    resolution: string | null
  output:
    readings: '[{timestamp: datetime, value: float}]'
    stats: '{min: float, max: float, avg: float}'
  errors:
  - DEVICE_NOT_FOUND
  - INVALID_METRIC
  - RANGE_TOO_LARGE
  invariants:
  - 'resolution: raw, 5min, hourly, daily — defaults to auto based on range'
  - max range 90 days
  - downsampled readings use average
consumes:
- module: device-registry
  interface: list_devices
  required: true
  contract_version: 1
