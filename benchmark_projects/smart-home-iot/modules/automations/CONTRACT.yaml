module: automations
version: 1
conventions_version: 2
status: draft
type: regular
purpose: 'Rule-based automations: triggers, conditions, and actions for device control'
provides:
- id: create_rule
  input:
    name: string
    trigger: '{type: string, config: object}'
    conditions: '[{type: string, config: object}]'
    actions: '[{device_id: string, command: string, params: object}]'
  output:
    rule_id: uuid
  errors:
  - INVALID_TRIGGER
  - INVALID_CONDITION
  - DEVICE_NOT_FOUND
  invariants:
  - 'trigger types: time, device_state, sensor_threshold, sunrise, sunset'
  - conditions evaluated AND — all must be true
  - subscribes to device_state_changed and sensor_reading events via BUS
- id: list_rules
  input:
    active_only: boolean
  output:
    rules: '[{rule_id: uuid, name: string, trigger: object, actions_count: integer, last_fired: datetime | null, enabled:
      boolean}]'
  errors: []
  invariants:
  - includes fire count and last execution time
- id: toggle_rule
  input:
    rule_id: uuid
    enabled: boolean
  output:
    success: boolean
  errors:
  - RULE_NOT_FOUND
  invariants:
  - disabled rules keep their config but don't fire
consumes:
- module: device-control
  interface: send_command
  required: true
  contract_version: 1
- module: device-control
  interface: batch_command
  required: true
  contract_version: 1
