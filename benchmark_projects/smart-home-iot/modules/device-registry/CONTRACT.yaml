module: device-registry
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Register, discover, and manage connected IoT devices on the local network
provides:
- id: discover_devices
  input:
    protocols: '[string]'
  output:
    discovered: '[{device_id: string, name: string, type: string, protocol: string, ip: string}]'
  errors:
  - SCAN_FAILED
  invariants:
  - 'protocols: zigbee, zwave, wifi, bluetooth'
  - scan timeout 30 seconds
  - publishes device_discovered event via BUS for each new device
- id: register_device
  input:
    device_id: string
    name: string
    room: string | null
  output:
    registered: boolean
  errors:
  - DEVICE_NOT_FOUND
  - ALREADY_REGISTERED
  invariants:
  - device must be discovered before registration
- id: list_devices
  input:
    room: string | null
    type: string | null
  output:
    devices: '[{device_id: string, name: string, type: string, room: string | null, online: boolean, last_seen: datetime}]'
  errors: []
  invariants:
  - online determined by heartbeat within last 60 seconds
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
