module: user-auth
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Registration, login, sessions, password reset, and team invitations
provides:
- id: register
  input:
    email: string
    password: string
    display_name: string
  output:
    user_id: uuid
    token: string
  errors:
  - EMAIL_TAKEN
  - WEAK_PASSWORD
  - INVALID_EMAIL
  invariants:
  - auto-sends verification email on register
  - password must be at least 8 characters with one number
- id: login
  input:
    email: string
    password: string
  output:
    user_id: uuid
    token: string
    refresh_token: string
  errors:
  - INVALID_CREDENTIALS
  - ACCOUNT_LOCKED
  - EMAIL_NOT_VERIFIED
  invariants:
  - same error for wrong password and non-existent email
  - locks account after 5 failed attempts in 15 minutes
- id: verify_token
  input:
    token: string
  output:
    user_id: uuid
    email: string
    role: string
  errors:
  - TOKEN_EXPIRED
  - INVALID_TOKEN
  invariants:
  - primary identity check for all modules
  - returns role for authorization decisions
- id: reset_password
  input:
    email: string
  output:
    success: boolean
  errors:
  - RATE_LIMITED
  invariants:
  - succeeds silently for non-existent emails
  - invalidates all existing sessions on reset
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
