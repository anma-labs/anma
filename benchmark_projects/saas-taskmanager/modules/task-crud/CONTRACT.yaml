module: task-crud
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Create, read, update, delete tasks with assignees, due dates, and priorities
provides:
- id: create_task
  input:
    team_id: uuid
    title: string
    description: string | null
    assignee_id: uuid | null
    due_date: datetime | null
    priority: string
  output:
    task_id: uuid
    created_at: datetime
  errors:
  - TEAM_NOT_FOUND
  - INVALID_PRIORITY
  - ASSIGNEE_NOT_IN_TEAM
  invariants:
  - 'valid priorities: critical, high, medium, low'
  - publishes task_created event via BUS
  - defaults to medium priority if not specified
- id: update_task
  input:
    task_id: uuid
    fields: '{title?: string, description?: string, status?: string, assignee_id?: uuid, due_date?: datetime, priority?: string}'
  output:
    task: object
    changed_fields: '[string]'
  errors:
  - TASK_NOT_FOUND
  - INVALID_STATUS_TRANSITION
  - FORBIDDEN
  invariants:
  - publishes task_updated event with changed_fields
  - 'status transitions: open→in_progress→review→done, any→cancelled'
- id: get_task
  input:
    task_id: uuid
  output:
    task: object
  errors:
  - TASK_NOT_FOUND
  invariants:
  - includes full history of status changes
- id: list_tasks
  input:
    team_id: uuid
    filters: '{status?: string, assignee_id?: uuid, priority?: string, due_before?: datetime}'
  output:
    tasks: '[object]'
    total: integer
  errors:
  - TEAM_NOT_FOUND
  invariants:
  - paginated with cursor, 50 per page default
  - sorted by priority desc then due_date asc
- id: delete_task
  input:
    task_id: uuid
  output:
    success: boolean
  errors:
  - TASK_NOT_FOUND
  - FORBIDDEN
  invariants:
  - soft delete — recoverable for 30 days
  - publishes task_deleted event via BUS
consumes:
- module: user-auth
  interface: verify_token
  required: true
  contract_version: 1
- module: team-mgmt
  interface: list_members
  required: true
  contract_version: 1
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
