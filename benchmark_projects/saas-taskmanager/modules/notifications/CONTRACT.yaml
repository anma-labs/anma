module: notifications
version: 1
conventions_version: 2
status: draft
type: regular
purpose: In-app and email notifications triggered by task and team events
provides:
- id: get_notifications
  input:
    user_id: uuid
    unread_only: boolean
  output:
    notifications: '[{id: uuid, type: string, message: string, read: boolean, created_at: datetime}]'
  errors:
  - UNAUTHORIZED
  invariants:
  - returns newest first
  - max 100 per request
- id: mark_read
  input:
    notification_ids: '[uuid]'
  output:
    updated_count: integer
  errors:
  - UNAUTHORIZED
  invariants:
  - idempotent — marking already-read notifications succeeds silently
- id: update_preferences
  input:
    user_id: uuid
    preferences: '{email_enabled: boolean, types: [string]}'
  output:
    preferences: object
  errors:
  - INVALID_TYPE
  invariants:
  - subscribes to task_created, task_updated, member_added events via BUS
consumes:
- module: user-auth
  interface: verify_token
  required: true
  contract_version: 1
