module: search-index
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Full-text search across tasks, comments, and team content
provides:
- id: search
  input:
    team_id: uuid
    query: string
    filters: '{type?: string, date_range?: object}'
  output:
    results: '[{type: string, id: uuid, snippet: string, score: float}]'
    total: integer
  errors:
  - INVALID_QUERY
  - TEAM_NOT_FOUND
  invariants:
  - results ranked by relevance score
  - snippet highlights matched terms
  - subscribes to task_created and task_updated events for indexing
- id: reindex
  input:
    team_id: uuid
  output:
    job_id: uuid
    estimated_seconds: integer
  errors:
  - REINDEX_IN_PROGRESS
  invariants:
  - async operation — returns immediately with job_id
  - publishes reindex_complete event via BUS
consumes:
- module: user-auth
  interface: verify_token
  required: true
  contract_version: 1
- module: task-crud
  interface: list_tasks
  required: false
  contract_version: 1
