module: team-mgmt
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Team creation, membership, roles, and permissions within organizations
provides:
- id: create_team
  input:
    name: string
    owner_id: uuid
  output:
    team_id: uuid
    invite_code: string
  errors:
  - TEAM_LIMIT_REACHED
  - INVALID_NAME
  invariants:
  - creator automatically becomes admin
  - generates unique 8-char invite code
- id: add_member
  input:
    team_id: uuid
    user_id: uuid
    role: string
  output:
    membership_id: uuid
  errors:
  - ALREADY_MEMBER
  - TEAM_NOT_FOUND
  - INVALID_ROLE
  invariants:
  - publishes member_added event via BUS
  - 'valid roles: admin, member, viewer'
- id: remove_member
  input:
    team_id: uuid
    user_id: uuid
  output:
    success: boolean
  errors:
  - NOT_MEMBER
  - CANNOT_REMOVE_OWNER
  invariants:
  - publishes member_removed event via BUS
  - reassigns owned tasks to team admin
- id: list_members
  input:
    team_id: uuid
  output:
    members: '[{user_id: uuid, role: string, joined_at: datetime}]'
  errors:
  - TEAM_NOT_FOUND
  invariants:
  - sorted by join date ascending
  - includes pending invitations with status
consumes:
- module: user-auth
  interface: verify_token
  required: true
  contract_version: 1
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
