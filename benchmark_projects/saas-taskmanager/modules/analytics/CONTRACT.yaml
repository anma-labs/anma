module: analytics
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Team productivity metrics, task completion rates, and velocity tracking
provides:
- id: get_team_stats
  input:
    team_id: uuid
    period: string
  output:
    tasks_created: integer
    tasks_completed: integer
    avg_completion_hours: float
    by_member: '[object]'
  errors:
  - TEAM_NOT_FOUND
  - INVALID_PERIOD
  invariants:
  - 'valid periods: day, week, month, quarter'
  - by_member breakdown includes each member's task count and avg time
- id: get_velocity
  input:
    team_id: uuid
    weeks: integer
  output:
    data_points: '[{week: string, completed: integer, created: integer}]'
  errors:
  - TEAM_NOT_FOUND
  invariants:
  - max 52 weeks
  - subscribes to task_updated events for real-time tracking
consumes:
- module: user-auth
  interface: verify_token
  required: true
  contract_version: 1
- module: task-crud
  interface: list_tasks
  required: true
  contract_version: 1
