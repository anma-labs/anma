module: request-router
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Route incoming API requests to backend services based on path and method matching
provides:
- id: register_route
  input:
    path_pattern: string
    method: string
    backend_url: string
    strip_prefix: boolean
    timeout_ms: integer | null
  output:
    route_id: uuid
  errors:
  - DUPLICATE_ROUTE
  - INVALID_PATTERN
  - INVALID_METHOD
  invariants:
  - path_pattern supports :param and * wildcards
  - 'methods: GET, POST, PUT, PATCH, DELETE, OPTIONS'
  - timeout defaults to 30000ms
  - publishes route_registered event via BUS
- id: resolve_route
  input:
    path: string
    method: string
  output:
    route_id: uuid
    backend_url: string
    params: object
    timeout_ms: integer
  errors:
  - NO_MATCH
  invariants:
  - most specific pattern wins
  - extracts path params into params object
- id: list_routes
  input: {}
  output:
    routes: '[{route_id: uuid, path_pattern: string, method: string, backend_url: string, request_count: integer}]'
  errors: []
  invariants:
  - includes request count from last 24 hours
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
