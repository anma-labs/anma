module: auth-gateway
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Validate API keys, JWT tokens, and OAuth credentials at the gateway level
provides:
- id: create_api_key
  input:
    name: string
    scopes: '[string]'
    rate_limit: integer | null
    expires_at: datetime | null
  output:
    key_id: uuid
    api_key: string
  errors:
  - INVALID_SCOPE
  - NAME_EXISTS
  invariants:
  - api_key only returned at creation — cannot be retrieved later
  - scopes must match registered route patterns
- id: validate_request
  input:
    headers: object
    path: string
    method: string
  output:
    authenticated: boolean
    identity: '{type: string, id: string, scopes: [string]} | null'
  errors:
  - INVALID_KEY
  - KEY_EXPIRED
  - INSUFFICIENT_SCOPE
  - TOKEN_EXPIRED
  invariants:
  - checks Authorization header for Bearer token or X-API-Key header
  - validates scope against requested route
- id: revoke_key
  input:
    key_id: uuid
  output:
    revoked: boolean
  errors:
  - KEY_NOT_FOUND
  invariants:
  - immediate effect — cached validations invalidated
consumes:
- module: request-router
  interface: resolve_route
  required: true
  contract_version: 1
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
