module: gateway-analytics
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Request logging, latency tracking, error rates, and usage dashboards
provides:
- id: get_overview
  input:
    period: string
  output:
    total_requests: integer
    error_rate: float
    p50_latency_ms: integer
    p95_latency_ms: integer
    p99_latency_ms: integer
    top_routes: '[object]'
    top_errors: '[object]'
  errors:
  - INVALID_PERIOD
  invariants:
  - 'periods: hour, day, week, month'
  - subscribes to all request events via BUS
  - latency percentiles computed from sampled data
- id: get_route_stats
  input:
    route_id: uuid
    period: string
  output:
    requests: integer
    errors: integer
    latency: '{p50: integer, p95: integer, p99: integer}'
    status_codes: object
  errors:
  - ROUTE_NOT_FOUND
  - INVALID_PERIOD
  invariants:
  - 'status_codes is histogram: {200: count, 400: count, ...}'
consumes:
- module: request-router
  interface: list_routes
  required: true
  contract_version: 1
