module: rate-limiter
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Enforce request rate limits per API key, IP, or route with sliding window
provides:
- id: check_limit
  input:
    key: string
    route_id: uuid | null
  output:
    allowed: boolean
    remaining: integer
    reset_at: datetime
    limit: integer
  errors: []
  invariants:
  - sliding window algorithm — not fixed buckets
  - returns remaining even when allowed=false
  - per-key limits override global defaults
- id: set_limit
  input:
    scope: string
    scope_id: string
    requests_per_minute: integer
  output:
    success: boolean
  errors:
  - INVALID_SCOPE
  invariants:
  - 'scopes: global, key, route, ip'
  - changes take effect immediately
- id: get_usage
  input:
    key: string | null
    period: string
  output:
    requests: integer
    throttled: integer
    top_routes: '[{route_id: uuid, count: integer}]'
  errors:
  - INVALID_PERIOD
  invariants:
  - 'periods: minute, hour, day'
consumes:
- module: auth-gateway
  interface: validate_request
  required: true
  contract_version: 1
