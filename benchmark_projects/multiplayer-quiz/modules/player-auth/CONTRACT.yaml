module: player-auth
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Player registration, guest accounts, and session management
provides:
- id: register
  input:
    username: string
    email: string | null
    password: string | null
  output:
    player_id: uuid
    token: string
    is_guest: boolean
  errors:
  - USERNAME_TAKEN
  - INVALID_USERNAME
  invariants:
  - guest accounts created with null email/password
  - 'usernames: 3-20 chars, alphanumeric plus underscore'
- id: authenticate
  input:
    token: string
  output:
    player_id: uuid
    username: string
    is_guest: boolean
  errors:
  - TOKEN_EXPIRED
  - INVALID_TOKEN
  invariants:
  - guest tokens expire after 24 hours, registered after 30 days
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
