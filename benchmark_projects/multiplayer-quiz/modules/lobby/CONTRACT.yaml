module: lobby
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Create and manage game lobbies, handle player join/leave, ready state
provides:
- id: create_lobby
  input:
    host_id: uuid
    settings: '{max_players: integer, rounds: integer, time_per_question: integer, category: string | null}'
  output:
    lobby_id: uuid
    join_code: string
  errors:
  - INVALID_SETTINGS
  - PLAYER_IN_LOBBY
  invariants:
  - join_code is 6 uppercase alphanumeric chars
  - max_players between 2 and 8
  - publishes lobby_created event via BUS
- id: join_lobby
  input:
    join_code: string
    player_id: uuid
  output:
    lobby_id: uuid
    players: '[{player_id: uuid, username: string, ready: boolean}]'
  errors:
  - LOBBY_NOT_FOUND
  - LOBBY_FULL
  - GAME_ALREADY_STARTED
  - PLAYER_IN_LOBBY
  invariants:
  - publishes player_joined event via BUS
  - returns current player list for lobby state sync
- id: set_ready
  input:
    lobby_id: uuid
    player_id: uuid
    ready: boolean
  output:
    all_ready: boolean
  errors:
  - NOT_IN_LOBBY
  invariants:
  - when all players ready, publishes all_ready event via BUS
- id: leave_lobby
  input:
    lobby_id: uuid
    player_id: uuid
  output:
    success: boolean
  errors:
  - NOT_IN_LOBBY
  invariants:
  - if host leaves, next player becomes host
  - if last player leaves, lobby is destroyed
consumes:
- module: player-auth
  interface: authenticate
  required: true
  contract_version: 1
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
