module: leaderboard
version: 1
conventions_version: 2
status: draft
type: regular
purpose: All-time and seasonal player rankings based on game results
provides:
- id: get_leaderboard
  input:
    type: string
    limit: integer | null
  output:
    entries: '[{rank: integer, player_id: uuid, username: string, total_points: integer, games_played: integer, win_rate:
      float}]'
  errors:
  - INVALID_TYPE
  invariants:
  - 'types: all_time, weekly, monthly'
  - default limit 50
  - subscribes to game_ended events for auto-update via BUS
consumes:
- module: player-auth
  interface: authenticate
  required: true
  contract_version: 1
