module: matchmaking
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Auto-match players into lobbies based on skill level and preferences
provides:
- id: join_queue
  input:
    player_id: uuid
    preferences: '{category: string | null, difficulty: string | null}'
  output:
    queue_position: integer
    estimated_wait_seconds: integer
  errors:
  - ALREADY_IN_QUEUE
  - PLAYER_IN_LOBBY
  invariants:
  - matches players within 200 rating points when possible
  - expands range by 100 every 30 seconds of waiting
- id: leave_queue
  input:
    player_id: uuid
  output:
    success: boolean
  errors:
  - NOT_IN_QUEUE
  invariants:
  - publishes match_found event via BUS when group formed
consumes:
- module: player-auth
  interface: authenticate
  required: true
  contract_version: 1
- module: lobby
  interface: create_lobby
  required: true
  contract_version: 1
- module: leaderboard
  interface: get_leaderboard
  required: false
  contract_version: 1
