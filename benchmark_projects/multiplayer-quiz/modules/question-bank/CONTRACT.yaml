module: question-bank
version: 1
conventions_version: 2
status: stable
type: regular
purpose: Store, retrieve, and manage trivia questions across categories and difficulties
provides:
- id: get_questions
  input:
    count: integer
    category: string | null
    difficulty: string | null
    exclude_ids: '[uuid]'
  output:
    questions: '[{id: uuid, text: string, options: [string], correct_index: integer, category: string, difficulty: string}]'
  errors:
  - NOT_ENOUGH_QUESTIONS
  - INVALID_CATEGORY
  invariants:
  - always returns exactly count questions or errors
  - randomized order, no repeats within exclude_ids
  - 'difficulties: easy, medium, hard'
- id: report_question
  input:
    question_id: uuid
    reason: string
  output:
    report_id: uuid
  errors:
  - QUESTION_NOT_FOUND
  invariants:
  - auto-disables question after 3 reports
consumes: []
contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
