module: achievements
version: 1
conventions_version: 2
status: draft
type: regular
purpose: Track and award player achievements based on game performance milestones
provides:
- id: get_achievements
  input:
    player_id: uuid
  output:
    unlocked: '[{id: string, name: string, description: string, unlocked_at: datetime}]'
    progress: '[{id: string, name: string, current: integer, target: integer}]'
  errors:
  - PLAYER_NOT_FOUND
  invariants:
  - subscribes to game_ended events to check unlock conditions via BUS
- id: list_all_achievements
  input: {}
  output:
    achievements: '[{id: string, name: string, description: string, rarity: float}]'
  errors: []
  invariants:
  - rarity is percentage of players who have unlocked it
consumes:
- module: player-auth
  interface: authenticate
  required: true
  contract_version: 1
