module: chat
version: 1
conventions_version: 2
status: draft
type: regular
purpose: In-lobby text chat between players before and during games
provides:
- id: send_message
  input:
    lobby_id: uuid
    player_id: uuid
    text: string
  output:
    message_id: uuid
    timestamp: datetime
  errors:
  - NOT_IN_LOBBY
  - MESSAGE_TOO_LONG
  - RATE_LIMITED
  invariants:
  - max 500 chars per message
  - 'rate limit: 5 messages per 10 seconds'
  - basic profanity filter applied
- id: get_messages
  input:
    lobby_id: uuid
    after: datetime | null
  output:
    messages: '[{id: uuid, player_id: uuid, username: string, text: string, timestamp: datetime}]'
  errors:
  - LOBBY_NOT_FOUND
  invariants:
  - returns max 100 messages
  - newest last
consumes:
- module: player-auth
  interface: authenticate
  required: true
  contract_version: 1
