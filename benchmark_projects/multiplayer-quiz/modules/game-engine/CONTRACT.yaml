module: game-engine
version: 1
conventions_version: 2
status: draft
type: regular
purpose: 'Run game rounds: distribute questions, collect answers, compute scores per round'
provides:
- id: start_game
  input:
    lobby_id: uuid
  output:
    game_id: uuid
    round_count: integer
    players: '[uuid]'
  errors:
  - LOBBY_NOT_FOUND
  - NOT_ALL_READY
  - TOO_FEW_PLAYERS
  invariants:
  - locks lobby — no new joins after start
  - fetches questions from question-bank
  - publishes game_started event via BUS
- id: submit_answer
  input:
    game_id: uuid
    player_id: uuid
    round: integer
    answer_index: integer
  output:
    accepted: boolean
    time_ms: integer
  errors:
  - GAME_NOT_FOUND
  - ROUND_EXPIRED
  - ALREADY_ANSWERED
  invariants:
  - faster correct answers score more points
  - answer window closes after time_per_question seconds
- id: get_round_results
  input:
    game_id: uuid
    round: integer
  output:
    correct_index: integer
    answers: '[{player_id: uuid, answer_index: integer, time_ms: integer, points: integer}]'
  errors:
  - GAME_NOT_FOUND
  - ROUND_NOT_COMPLETE
  invariants:
  - only available after all players answer or timer expires
- id: end_game
  input:
    game_id: uuid
  output:
    final_scores: '[{player_id: uuid, total_points: integer, correct_count: integer, rank: integer}]'
  errors:
  - GAME_NOT_FOUND
  - GAME_NOT_COMPLETE
  invariants:
  - publishes game_ended event with final_scores via BUS
  - ties broken by total response time
consumes:
- module: lobby
  interface: create_lobby
  required: true
  contract_version: 1
- module: question-bank
  interface: get_questions
  required: true
  contract_version: 1
